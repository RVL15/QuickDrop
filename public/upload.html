<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickDrop — Send</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0b;
      --card: #151517;
      --border: #2a2a2e;
      --fg: #e8e8ec;
      --muted: #6e6e7a;
      --accent: #e8943a;
      --accent-dim: rgba(232,148,58,0.12);
      --success: #34d399;
      --danger: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0a0a0b;
      font-size: 14px;
    }

    .logo span {
      font-size: 18px;
      font-weight: 700;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--card);
      margin-bottom: 20px;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone i {
      font-size: 36px;
      color: var(--accent);
      margin-bottom: 12px;
      display: block;
    }

    .drop-zone p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .drop-zone p strong {
      color: var(--fg);
    }

    .selected-file {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      align-items: center;
      gap: 12px;
    }

    .selected-file.visible {
      display: flex;
    }

    .selected-file .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .selected-file .info {
      flex: 1;
      min-width: 0;
    }

    .selected-file .name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selected-file .size {
      font-size: 12px;
      color: var(--muted);
    }

    .selected-file .remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .btn-upload {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #0a0a0b;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: none;
    }

    .btn-upload.visible { display: block; }
    .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-upload:not(:disabled):hover { opacity: 0.9; transform: scale(1.01); }

    .progress-wrap {
      display: none;
      margin-top: 16px;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
    }

    .result {
      display: none;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .result.visible { display: block; }

    .result.success {
      background: rgba(52,211,153,0.08);
      color: var(--success);
      border: 1px solid rgba(52,211,153,0.2);
    }

    .result.error {
      background: rgba(248,113,113,0.08);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.2);
    }

    .result i {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
      <span>QuickDrop</span>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" aria-label="Choose a file to upload" />
      <i class="fa-solid fa-cloud-arrow-up"></i>
      <p><strong>Tap to choose</strong> or drag a file here</p>
      <p style="font-size:12px; margin-top:4px;">Max 11 GB</p>
    </div>

    <div class="selected-file" id="selectedFile">
      <div class="icon"><i class="fa-regular fa-file"></i></div>
      <div class="info">
        <div class="name" id="fileName"></div>
        <div class="size" id="fileSize"></div>
      </div>
      <button class="remove" id="removeBtn" aria-label="Remove selected file"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <button class="btn-upload" id="uploadBtn">Send File</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">Uploading…</div>
    </div>

    <div class="result" id="result">
      <i id="resultIcon"></i>
      <span id="resultText"></span>
    </div>

    <p class="hint">File goes directly to the receiving device</p>
  </div>

  <script>
    const sessionId = window.location.pathname.split("/").pop();
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const selectedFile = document.getElementById("selectedFile");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const removeBtn = document.getElementById("removeBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const result = document.getElementById("result");
    const resultIcon = document.getElementById("resultIcon");
    const resultText = document.getElementById("resultText");

    let chosenFile = null;
    let uploadAttempts = 0;
    const MAX_RETRIES = 3;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function selectFile(file) {
      if (!file) return;
      if (file.size > 11 * 1024 * 1024 * 1024) {
        showResult("error", "File exceeds 11 GB limit");
        return;
      }
      chosenFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      selectedFile.classList.add("visible");
      uploadBtn.classList.add("visible");
      hideResult();
    }

    function clearFile() {
      chosenFile = null;
      fileInput.value = "";
      selectedFile.classList.remove("visible");
      uploadBtn.classList.remove("visible");
      progressWrap.classList.remove("visible");
      progressFill.style.width = "0%";
      hideResult();
    }

    function showResult(type, msg) {
      result.className = "result visible " + type;
      resultIcon.className = type === "success"
        ? "fa-solid fa-circle-check"
        : "fa-solid fa-circle-exclamation";
      resultText.textContent = msg;
    }

    function hideResult() {
      result.className = "result";
    }

    /* Drag & drop events */
    dropZone.addEventListener("dragover", function (e) {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", function () {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", function (e) {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", function () {
      if (fileInput.files.length) selectFile(fileInput.files[0]);
    });

    removeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      clearFile();
    });

    function performUpload() {
      if (!chosenFile) return;

      const formData = new FormData();
      formData.append("file", chosenFile);

      uploadBtn.disabled = true;
      uploadBtn.textContent = "Sending…";
      progressWrap.classList.add("visible");
      progressFill.style.width = "0%";
      progressLabel.textContent = "Uploading…";
      hideResult();

      const xhr = new XMLHttpRequest();
      
      // Set timeout to 1 hour for very large files (10GB+)
      xhr.timeout = 3600000;

      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + "%";
          progressLabel.textContent = pct + "% uploaded";
        }
      };

      xhr.onload = function () {
        console.log("XHR onload — Status:", xhr.status, "Response:", xhr.responseText);
        
        if (xhr.status >= 200 && xhr.status < 300) {
          progressFill.style.width = "100%";
          progressLabel.textContent = "Done";
          showResult("success", "File sent successfully");
          uploadAttempts = 0;
          setTimeout(clearFile, 3000);
        } else {
          let msg = "Upload failed (HTTP " + xhr.status + ")";
          try { msg = JSON.parse(xhr.responseText).error || msg; } catch (_) {}
          
          // Retry for network errors
          if (uploadAttempts < MAX_RETRIES && (xhr.status === 0 || xhr.status >= 500)) {
            uploadAttempts++;
            showResult("error", msg + " (Retry " + uploadAttempts + "/" + MAX_RETRIES + ")");
            setTimeout(performUpload, 2000);
            return;
          }
          
          showResult("error", msg);
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Send File";
        }
      };

      xhr.onerror = function (e) {
        console.log("XHR onerror — Event:", e);
        // Retry on network error
        if (uploadAttempts < MAX_RETRIES) {
          uploadAttempts++;
          showResult("error", "Network error - retrying... (" + uploadAttempts + "/" + MAX_RETRIES + ")");
          setTimeout(performUpload, 2000);
          return;
        }
        
        showResult("error", "Network error — check your connection");
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Send File";
      };
      
      xhr.ontimeout = function () {
        console.log("XHR ontimeout");
        if (uploadAttempts < MAX_RETRIES) {
          uploadAttempts++;
          showResult("error", "Timeout - retrying... (" + uploadAttempts + "/" + MAX_RETRIES + ")");
          setTimeout(performUpload, 2000);
          return;
        }
        
        showResult("error", "Upload timeout — connection is too slow. Try again with a better connection.");
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Send File";
      };

      console.log("Starting upload — File:", chosenFile.name, "Size:", chosenFile.size, "Type:", chosenFile.type);
      xhr.open("POST", "/upload/" + sessionId);
      xhr.send(formData);
    }

    /* Upload */
    uploadBtn.addEventListener("click", async function () {
      uploadAttempts = 0;
      performUpload();
    });
  </script>
</body>
</html>
