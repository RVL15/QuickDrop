<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png">
  <meta name="theme-color" content="#e8943a">
  <title>QuickDrop — Send</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/site.css">
  <style>
    :root {
      --bg: #0a0a0b;
      --card: #151517;
      --border: #2a2a2e;
      --fg: #e8e8ec;
      --muted: #6e6e7a;
      --accent: #e8943a;
      --accent-dim: rgba(232,148,58,0.12);
      --success: #34d399;
      --danger: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      padding: 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 14px;
    }

    .tab-btn {
      flex: 1;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #0a0a0b;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0a0a0b;
      font-size: 14px;
    }

    .logo span {
      font-size: 20px;
      font-weight: 700;
    }

    .platform-label {
      margin: -22px 0 24px 40px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--card);
      margin-bottom: 20px;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone i {
      font-size: 36px;
      color: var(--accent);
      margin-bottom: 12px;
      display: block;
    }

    .drop-zone p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }

    .drop-zone p strong {
      color: var(--fg);
    }

    .selected-file {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      align-items: center;
      gap: 12px;
    }

    .selected-file.visible {
      display: flex;
    }

    .selected-file .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .selected-file .info {
      flex: 1;
      min-width: 0;
    }

    .selected-file .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selected-file .size {
      font-size: 13px;
      color: var(--muted);
    }

    .selected-file .remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .btn-upload {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #0a0a0b;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: block;
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-upload.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-upload:disabled { cursor: not-allowed; transform: none; }
    .btn-upload:not(:disabled):hover { opacity: 0.92; transform: scale(1.01); }

    .progress-wrap {
      display: none;
      margin-top: 16px;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
    }

    .result {
      display: none;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
    }

    .result.visible { display: block; }

    .result.success {
      background: rgba(52,211,153,0.08);
      color: var(--success);
      border: 1px solid rgba(52,211,153,0.2);
    }

    .result.error {
      background: rgba(248,113,113,0.08);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.2);
    }

    .result i {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .hint {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 20px;
    }

    .session-note {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(232,148,58,0.08);
      border: 1px solid rgba(232,148,58,0.18);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .files-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .file-item .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-item .info {
      flex: 1;
      min-width: 0;
    }

    .file-item .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item .size {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-item .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      color: #0a0a0b;
      text-decoration: none;
      flex-shrink: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
      <span>QuickDrop</span>
    </div>

    <p class="platform-label">Mobile transfer interface</p>

    <div class="tabs" role="tablist" aria-label="Transfer modes">
      <button class="tab-btn active" id="sendTabBtn" type="button">Send</button>
      <button class="tab-btn" id="receiveTabBtn" type="button">Receive</button>
    </div>

    <div class="panel active" id="sendPanel">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" aria-label="Choose a file to upload" />
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p><strong>Tap to choose</strong> or drag a file here.</p>
        <p style="font-size:13px; margin-top:4px;">Maximum file size: 11 GB</p>
      </div>

      <div class="selected-file" id="selectedFile">
        <div class="icon"><i class="fa-regular fa-file"></i></div>
        <div class="info">
          <div class="name" id="fileName"></div>
          <div class="size" id="fileSize"></div>
        </div>
        <button class="remove" id="removeBtn" aria-label="Remove selected file"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <button class="btn-upload" id="uploadBtn" disabled>Upload file</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">Uploading…</div>
      </div>

      <div class="result" id="result">
        <i id="resultIcon"></i>
        <span id="resultText"></span>
      </div>
    </div>

    <div class="panel" id="receivePanel">
      <div class="card-like" style="background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;">
          <div>
            <div style="font-size:17px; font-weight:700;">Received files</div>
            <div style="font-size:13px; color:var(--muted); margin-top:4px;">Files shared in this session will appear here.</div>
          </div>
          <div style="font-size:13px; color:var(--muted);">Live</div>
        </div>
        <div id="mobileFilesList" class="files-list"></div>
        <div id="mobileEmptyState" class="hint" style="margin-top:14px;">No files have been received yet.</div>
      </div>
    </div>

    <div class="card-like" style="margin-top:16px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; text-align: center;">
      <footer class="site-footer" style="margin:0; padding:0; border:0;">
        <a href="/about.html">About</a> |
        <a href="/privacy.html">Privacy</a> |
        <a href="/contact.html">Contact</a>
      </footer>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const sessionId = window.location.pathname.split("/").pop();
    const sendTabBtn = document.getElementById("sendTabBtn");
    const receiveTabBtn = document.getElementById("receiveTabBtn");
    const sendPanel = document.getElementById("sendPanel");
    const receivePanel = document.getElementById("receivePanel");
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const selectedFile = document.getElementById("selectedFile");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const removeBtn = document.getElementById("removeBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const result = document.getElementById("result");
    const resultIcon = document.getElementById("resultIcon");
    const resultText = document.getElementById("resultText");
    const mobileFilesList = document.getElementById("mobileFilesList");
    const mobileEmptyState = document.getElementById("mobileEmptyState");

    let chosenFile = null;
    let uploadAttempts = 0;
    const MAX_RETRIES = 3;
    let socket;
    const seenFiles = new Set();

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function selectFile(file) {
      if (!file) return;
      if (file.size > 11 * 1024 * 1024 * 1024) {
        showResult("error", "File exceeds 11 GB limit");
        return;
      }
      chosenFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      selectedFile.classList.add("visible");
      uploadBtn.classList.add("visible");
      uploadBtn.disabled = false;
      hideResult();
    }

    function clearFile() {
      chosenFile = null;
      fileInput.value = "";
      selectedFile.classList.remove("visible");
      uploadBtn.classList.remove("visible");
      uploadBtn.disabled = true;
      progressWrap.classList.remove("visible");
      progressFill.style.width = "0%";
      hideResult();
    }

    function showResult(type, msg) {
      result.className = "result visible " + type;
      resultIcon.className = type === "success"
        ? "fa-solid fa-circle-check"
        : "fa-solid fa-circle-exclamation";
      resultText.textContent = msg;
    }

    function hideResult() {
      result.className = "result";
    }

    function setActiveTab(tabName) {
      const showSend = tabName === "send";
      sendTabBtn.classList.toggle("active", showSend);
      receiveTabBtn.classList.toggle("active", !showSend);
      sendPanel.classList.toggle("active", showSend);
      receivePanel.classList.toggle("active", !showSend);
    }

    function formatReceivedFile(file) {
      const ext = file.originalName.split(".").pop().toLowerCase();
      const iconMap = {
        pdf: "fa-file-pdf", doc: "fa-file-word", docx: "fa-file-word",
        xls: "fa-file-excel", xlsx: "fa-file-excel", csv: "fa-file-csv",
        png: "fa-file-image", jpg: "fa-file-image", jpeg: "fa-file-image",
        gif: "fa-file-image", webp: "fa-file-image", svg: "fa-file-image",
        mp4: "fa-file-video", mov: "fa-file-video", avi: "fa-file-video",
        mp3: "fa-file-audio", wav: "fa-file-audio", zip: "fa-file-zipper",
        rar: "fa-file-zipper", "7z": "fa-file-zipper",
        js: "fa-file-code", html: "fa-file-code", css: "fa-file-code",
        py: "fa-file-code", json: "fa-file-code"
      };
      const iconClass = iconMap[ext] || "fa-file";
      const item = document.createElement("div");
      item.className = "file-item";
      item.innerHTML =
        '<div class="icon"><i class="fa-regular ' + iconClass + '"></i></div>' +
        '<div class="info"><div class="name" title="' + file.originalName + '">' + file.originalName + '</div><div class="size">' + formatSize(file.size) + '</div></div>' +
        '<a class="download" href="/uploads/' + file.filename + '" download="' + file.originalName + '" title="Download"><i class="fa-solid fa-arrow-down"></i></a>';
      return item;
    }

    function addReceivedFile(file) {
      if (!file || !file.filename || seenFiles.has(file.filename)) return;
      seenFiles.add(file.filename);
      mobileEmptyState.style.display = "none";
      mobileFilesList.prepend(formatReceivedFile(file));
    }

    /* Drag & drop events */
    dropZone.addEventListener("dragover", function (e) {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", function () {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", function (e) {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", function () {
      if (fileInput.files.length) selectFile(fileInput.files[0]);
    });

    sendTabBtn.addEventListener("click", function () {
      setActiveTab("send");
    });

    receiveTabBtn.addEventListener("click", function () {
      setActiveTab("receive");
    });

    removeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      clearFile();
    });

    function performUpload() {
      if (!chosenFile) return;

      const formData = new FormData();
      formData.append("file", chosenFile);

      uploadBtn.disabled = true;
      uploadBtn.textContent = "Sending…";
      progressWrap.classList.add("visible");
      progressFill.style.width = "0%";
      progressLabel.textContent = "Uploading…";
      hideResult();

      const xhr = new XMLHttpRequest();
      
      // Set timeout to 1 hour for very large files (10GB+)
      xhr.timeout = 3600000;

      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + "%";
          progressLabel.textContent = pct + "% uploaded";
        }
      };

      xhr.onload = function () {
        console.log("XHR onload — Status:", xhr.status, "Response:", xhr.responseText);
        
        if (xhr.status >= 200 && xhr.status < 300) {
          progressFill.style.width = "100%";
          progressLabel.textContent = "Done";
          showResult("success", "File uploaded successfully");
          uploadAttempts = 0;
          setTimeout(clearFile, 3000);
        } else {
          let msg = "Upload failed (HTTP " + xhr.status + ")";
          try { msg = JSON.parse(xhr.responseText).error || msg; } catch (_) {}
          
          // Retry for network errors
          if (uploadAttempts < MAX_RETRIES && (xhr.status === 0 || xhr.status >= 500)) {
            uploadAttempts++;
            showResult("error", msg + " (Retry " + uploadAttempts + "/" + MAX_RETRIES + ")");
            setTimeout(performUpload, 2000);
            return;
          }
          
          showResult("error", msg);
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Upload file";
        }
      };

      xhr.onerror = function (e) {
        console.log("XHR onerror — Event:", e);
        // Retry on network error
        if (uploadAttempts < MAX_RETRIES) {
          uploadAttempts++;
          showResult("error", "Network error - retrying... (" + uploadAttempts + "/" + MAX_RETRIES + ")");
          setTimeout(performUpload, 2000);
          return;
        }
        
        showResult("error", "Network error — check your connection");
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload file";
      };
      
      xhr.ontimeout = function () {
        console.log("XHR ontimeout");
        if (uploadAttempts < MAX_RETRIES) {
          uploadAttempts++;
          showResult("error", "Timeout - retrying... (" + uploadAttempts + "/" + MAX_RETRIES + ")");
          setTimeout(performUpload, 2000);
          return;
        }
        
        showResult("error", "Upload timeout — connection is too slow. Try again with a better connection.");
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload file";
      };

      console.log("Starting upload — File:", chosenFile.name, "Size:", chosenFile.size, "Type:", chosenFile.type);
      xhr.open("POST", "/upload/" + sessionId);
      xhr.send(formData);
    }

    /* Upload */
    uploadBtn.addEventListener("click", async function () {
      uploadAttempts = 0;
      performUpload();
    });

    socket = io(window.location.origin, { transports: ["websocket"] });

    socket.on("connect", function () {
      socket.emit("join-session", sessionId);
    });

    socket.on("file-received", function (file) {
      addReceivedFile(file);
    });

    setActiveTab("send");
  </script>
</body>
</html>
