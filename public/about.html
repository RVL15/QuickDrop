  <h1>About QuickDrop</h1>

  <p>
    QuickDrop is a QR-based real-time file transfer web application
    that allows users to send files instantly between devices using
    a simple QR code system.
  </p>

  <p>
    Built using Node.js, Express, Socket.IO, and QR technology,
    QuickDrop provides fast and simple browser-based file sharing.
  </p>
